[skill]
name = "article-memory"
description = "Capture, store, search, and recall long-form articles and technical docs. Use when the user sends a URL to save, asks about previously saved articles, or wants to refresh a stored article. Do not use for personal preferences; use mempalace-memory for that."
version = "0.2.0"
tags = ["articles", "knowledge-base", "research", "learning"]

prompts = [
  """Boundary: use article-memory for article records, URLs, summaries, translations, value scores, tags, and research reports. Use mempalace-memory for durable personal facts, preferences, corrections, and conversation continuity. Never store secrets, API keys, passwords, or tokens.""",
  """Save intent — triggered when the user sends a bare URL or a save request (Chinese examples: "存一下 <url>", "收藏 <url>"; English examples: "save this", "add this to my reading list").
Call http_request POST http://127.0.0.1:3010/article-memory/ingest with body:
{"url": "<url>", "source_hint": "<channel>", "reply_handle": "<sender or null>", "tags": []}
channel values: iMessage → "imessage"; webhook/Shortcut → "shortcut"; otherwise use the real source name.
In the iMessage channel, reply_handle MUST be set to the sender handle; the daemon sends a completion notification via osascript when the job finishes. In every other channel, leave reply_handle as null.
Response handling:
- 202 + {job_id, status: "pending"} → tell the user "Received, crawling started."
- 409 + {error: "article_exists", title, existing_article_id} → tell the user "《title》 is already saved; want me to refresh it?"
- 409 + {error: "duplicate_within_window", ...} → tell the user "Saved this recently; try again later."
- 503 + {error: "persistence_degraded", ...} → tell the user "Daemon storage is degraded; please check disk space and restart."
""",
  """Refresh intent — triggered by re-crawl requests (Chinese examples: "帮我刷新 <url>", "重抓一下 <url>", "再抓一遍"; English examples: "refresh this", "re-fetch <url>").
Same endpoint and body as the save intent, but add "force": true.
force=true bypasses article-level dedup and overwrites the existing record (article_id is preserved).
409 article_exists never appears when force=true; however, duplicate_active_job (in-flight) and duplicate_within_window (saved within the last 24h) can still return 409.""",
  """Job status / audit intent — triggered when the user asks about job progress or recent failures (Chinese examples: "那篇存好了吗", "某个 job 现在什么状态", "最近失败了几篇"; English examples: "did that article save?", "show recent failures").
- Specific job: call article-memory.ingest_status with the job_id.
- Recent jobs / failures: call article-memory.ingest_list; pass status=failed to see failures only.""",
  """Query intent over stored articles — triggered by search / listing / health questions.
- article-memory.search: hybrid keyword + semantic search.
- article-memory.list: recent article records.
- article-memory.status: system status.""",
  """Quality gate: before saving, evaluate whether the article has clear authorship, durable insight, original analysis, useful detail, strong references, or practical workflow worth revisiting. Reject promotional, copied, thin, misleading, unverifiable, or momentarily interesting material.""",
  """Status values: candidate (not yet evaluated), saved (accepted), rejected (intentionally not kept), archived (old but retained). Ingest defaults to candidate.""",
  """Strategy review: when user asks to improve article cleaning or value judging, run 'daviszeroclaw articles strategy review-input --recent 20' first. Edit only config/davis/article_memory.toml. If config cannot express the needed behavior, write implementation request under .runtime/davis/article-memory/reports/implementation-requests/."""
]

[[tools]]
name = "status"
description = "Get article memory status: root paths, counts, tags, languages, and index status."
kind = "http"
command = "http://127.0.0.1:3010/article-memory/status"

[[tools]]
name = "list"
description = "List recent article records. Use for reports or quick inventory."
kind = "http"
command = "http://127.0.0.1:3010/article-memory/articles?limit={{limit}}"

[tools.args]
limit = "Maximum number of articles to return. Default 20."

[[tools]]
name = "search"
description = "Search articles by title, URL, source, tags, notes, content, summary, and translation. Uses hybrid keyword + semantic search when embedding index is configured."
kind = "http"
command = "http://127.0.0.1:3010/article-memory/search?q={{q}}&limit={{limit}}"

[tools.args]
q = "Search query: article title, topic keyword, URL fragment, tag, or any text."
limit = "Maximum number of results. Default 10."

[[tools]]
name = "ingest_status"
description = "Fetch the current state of a URL ingest job. Returns status ∈ {pending, fetching, cleaning, judging, embedding, saved, rejected, failed}, plus article_id (when stored), error (on failure), and outcome. Call when the user asks about job progress (Chinese examples: \"那篇存好了吗\"; English: \"did that save?\")."
kind = "http"
command = "http://127.0.0.1:3010/article-memory/ingest/{{job_id}}"

[tools.args]
job_id = "UUID returned by the submit call."

[[tools]]
name = "ingest_list"
description = "List recent ingest jobs. Optionally filter by status (e.g. status=failed). Call for audit questions (Chinese examples: \"最近哪些抓取失败了\", \"今天存了几篇\"; English: \"show today's ingests\", \"recent failures\")."
kind = "http"
command = "http://127.0.0.1:3010/article-memory/ingest?status={{status}}&limit={{limit}}"

[tools.args]
status = "One of pending|fetching|cleaning|judging|embedding|saved|rejected|failed. Leave empty to return all."
limit = "Maximum number of jobs to return. Default 20, max 200."
