# DavisZeroClaw runtime template.
# Rendered to .runtime/davis/config.toml by the Davis local proxy.

schema_version = 2

[gateway]
host = "0.0.0.0"
port = 3000
require_pairing = false
allow_public_bind = true

[channels.webhook]
enabled = true
port = 3001
listen_path = "/shortcut"
__DAVIS_WEBHOOK_SECRET_CONFIG__

__DAVIS_IMESSAGE_CONFIG__

[memory]
backend = "sqlite"
auto_save = true

[observability]
backend = "none"
# 本地默认保留最近一段 ZeroClaw 运行时 trace，方便排查 tool/provider 异常。
runtime_trace_mode = "rolling"
runtime_trace_path = "state/runtime-trace.jsonl"
runtime_trace_max_entries = 200

[http_request]
enabled = true
allow_private_hosts = true
allowed_domains = ["127.0.0.1", "localhost"]
timeout_secs = 30
max_response_size = 1000000

[skills]
allow_scripts = true

[scheduler]
enabled = true

[autonomy]
# 局域网开发默认值：Webhook 请求可直接进入工具调用链。
level = "full"
allowed_roots = ["__DAVIS_REPO_ROOT__"]
allowed_commands = [
  "git",
  "npm",
  "cargo",
  "ls",
  "cat",
  "grep",
  "find",
  "echo",
  "pwd",
  "wc",
  "head",
  "tail",
  "date",
  "python",
  "python3",
  "pip",
  "node",
  "daviszeroclaw",
]
shell_timeout_secs = 300

__DAVIS_PROVIDERS_CONFIG__
__DAVIS_QUERY_CLASSIFICATION_CONFIG__

[reliability]
__DAVIS_MODEL_FALLBACKS__

[mcp]
enabled = true
deferred_loading = false

# 当前默认不把原始 Home Assistant MCP 直接暴露给 ZeroClaw。
# HA 控制 / 审计统一走本地 Davis Rust 代理 + ha-control / ha-audit skill。

# 可选：后续需要本地生活服务 MCP 时再打开。
# [[mcp.servers]]
# name = "life_services"
# command = "npx"
# args = ["-y", "@greater-china/local-life-services-mcp"]
__DAVIS_MCP_SERVERS_CONFIG__
