# Hand-written overrides for article extraction rules.
#
# EMERGENCY REPAIR CHANNEL — this file is normally empty. Use it when a
# site's DOM changes and the rule learner hasn't caught up yet. Each
# [[overrides]] entry wins over any learned rule for the same host
# (learned rules live in `{runtime}/article_memory/learned_rules.json`).
#
# The loader tolerates a missing file, so leave this one untouched unless
# you actually need to override. Commit new entries with a note explaining
# why the learner couldn't do it automatically.
#
# Example:
#
# [[overrides]]
# host = "zhihu.com"
# content_selectors = [".QuestionAnswer-content .RichContent-inner"]
# remove_selectors = [".AnswerItem .RichContent-cover", "aside"]
# title_selector = "h1.QuestionHeader-title"
# start_markers = []
# end_markers = []
