[home_assistant]
url = "http://homeassistant.local:8123/api/mcp"
token = "your_home_assistant_long_lived_access_token"

[imessage]
allowed_contacts = ["+8613800138000", "user@icloud.com"]

[webhook]
secret = "replace-with-your-webhook-secret"

[[providers]]
name = "openrouter"
api_key = "your_openrouter_api_key"
base_url = "https://openrouter.ai/api/v1"
allowed_models = ["anthropic/claude-opus-4.6", "anthropic/claude-sonnet-4.6", "openai/gpt-4.1"]

[[providers]]
name = "deepseek"
api_key = "your_deepseek_api_key"
base_url = ""
allowed_models = ["deepseek-chat"]

# Each profile picks one configured provider + a model from its allowed_models.
# max_fallbacks caps how many cross-provider fallbacks ZeroClaw may try.
# Valid range: 0..=3.
[routing]
default_profile = "general_qa"

[routing.profiles.home_control]
provider = "openrouter"
model = "anthropic/claude-sonnet-4.6"
max_fallbacks = 2

[routing.profiles.general_qa]
provider = "openrouter"
model = "anthropic/claude-sonnet-4.6"
max_fallbacks = 2

[routing.profiles.research]
provider = "openrouter"
model = "anthropic/claude-opus-4.6"
max_fallbacks = 2

[routing.profiles.structured_lookup]
provider = "openrouter"
model = "anthropic/claude-sonnet-4.6"
max_fallbacks = 2

# Optional: extend or bias the built-in query classifier.
# Built-in defaults live in config/davis/query_classification.toml and always apply.
# User rules below are merged on top and win on priority ties.
#
# [[query_classification.rules]]
# hint = "home_control"
# keywords = ["开一下", "关一下"]
# priority = 25
#
# [[query_classification.rules]]
# hint = "research"
# keywords = ["为啥", "是怎么回事"]
# priority = 35

[crawl4ai]
enabled = true
# The Rust daemon supervises a long-lived adapter on this address.
# Change only if the default port (11235) conflicts with another service.
base_url = "http://127.0.0.1:11235"
timeout_secs = 90
headless = true
magic = true
simulate_user = true
override_navigator = true
remove_overlay_elements = true
enable_stealth = true

# MCP servers exposed to ZeroClaw. Every entry is passed through verbatim;
# Davis does not special-case any name. Built-in helpers like
# `daviszeroclaw memory mempalace enable` upsert their own entry here.
#
# Example — uncomment and adjust to add a filesystem MCP server:
#
# [[mcp.servers]]
# name = "filesystem"
# transport = "stdio"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
# tool_timeout_secs = 30
#
# Example — HTTP transport:
#
# [[mcp.servers]]
# name = "remote-thing"
# transport = "http"
# url = "https://example.com/mcp"
# headers = { X-Auth = "replace-with-your-credential" }
# tool_timeout_secs = 30

[article_memory.embedding]
enabled = false
# Reuse a configured OpenAI-compatible provider, such as "siliconflow".
provider = ""
# Optional direct credentials. Leave empty to reuse the provider's api_key/base_url.
api_key = ""
base_url = ""
model = "Qwen/Qwen3-Embedding-8B"
dimensions = 1024
max_input_chars = 12000

[article_memory.normalize]
llm_polish = false
llm_summary = false
# Reuse a configured OpenAI-compatible chat provider when enabled.
provider = ""
api_key = ""
base_url = ""
model = ""
min_polish_input_chars = 1200
max_polish_input_chars = 24000
summary_input_chars = 24000
fallback_min_ratio = 0.7

# URL ingest pipeline — crawl4ai fetches → article_memory pipeline.
# Any channel (iMessage, Shortcut, cron, CLI, HTTP) can POST a URL to
# `/article-memory/ingest` and the daemon handles crawl → clean → judge →
# embed asynchronously. Defaults are safe — leaving this block out routes
# every URL to the shared `articles-generic` Chromium profile.
[article_memory.ingest]
enabled = true
# Number of worker tokio tasks consuming the queue. Cross-host parallel,
# same-host serialized via the existing Crawl4aiProfileLocks.
max_concurrency = 3
# Chromium profile used when no host_profiles entry matches. Log in once
# with `daviszeroclaw crawl profile login articles-generic` if you want
# cookies persisted.
default_profile = "articles-generic"
# Resubmitting a URL that was Saved within this window returns HTTP 409
# instead of re-crawling. Set to 0 to disable dedup.
dedup_window_hours = 24
# Exact-match allowlist to bypass the SSRF guard for specific private
# hostnames (internal wikis, LAN tools). No wildcards. Example:
# allow_private_hosts = ["wiki.internal.corp"]
allow_private_hosts = []

# Per-host Chromium profile routing. First suffix match wins.
# Profiles are scoped per site so cookies for one site don't leak to
# another. Log a profile in with `daviszeroclaw crawl profile login
# articles-<name>` once; the cookies persist across restarts.
#
# [[article_memory.ingest.host_profiles]]
# match = "zhihu.com"
# profile = "articles-zhihu"
# source = "zhihu"
#
# [[article_memory.ingest.host_profiles]]
# match = "mp.weixin.qq.com"
# profile = "articles-weixin"
# source = "weixin"
#
# [[article_memory.ingest.host_profiles]]
# match = "medium.com"
# profile = "articles-medium"
# source = "medium"

