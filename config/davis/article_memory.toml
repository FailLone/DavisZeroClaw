# Article memory strategy.
#
# Davis agents may edit this file to improve article cleaning and value judging.
# They must not edit Rust source code. If strategy fields are insufficient,
# they should write an implementation request report instead.

[defaults]
min_kept_ratio = 0.20
max_kept_ratio = 0.98
min_normalized_chars = 800

exact_noise_lines = [
  "登录",
  "注册",
  "添加评论",
  "分享",
  "收藏",
  "喜欢",
  "关注问题",
  "写回答",
  "查看全部",
  "阅读全文",
  "收起",
  "举报",
  "广告",
]

contains_noise_lines = [
  "cookie",
  "privacy policy",
]

[value]
enabled = true
llm_judge = true
provider = "openrouter"
api_key = ""
base_url = ""
model = "openai/gpt-4.1"
max_input_chars = 12000
min_normalized_chars = 800
save_threshold = 0.75
candidate_threshold = 0.45

target_topics = [
  "AI agent",
  "agent",
  "MCP",
  "memory",
  "Claude Code",
  "OpenAI",
  "reasoning",
  "browser automation",
  "tool use",
  "multi-agent",
  "LLM",
]

# NOTE: URL ingest pipeline config lives in `config/davis/local.toml`
# under `[article_memory.ingest]` and `[[article_memory.ingest.host_profiles]]`,
# NOT in this file. This file is parsed as `ArticleCleaningConfig`, so any
# `[ingest]` section here is silently ignored. See `local.example.toml`
# for the documented shape.

[extract]
default_engine = "trafilatura"
fallback_ladder = ["trafilatura", "openrouter-llm"]

[extract.openrouter_llm]
provider = "openrouter"
model = "google/gemini-2.0-flash-001"
timeout_secs = 60
max_input_chars = 60000

[quality_gate]
enabled = true
min_markdown_chars = 500
min_kept_ratio = 0.05
min_paragraphs = 3
max_link_density = 0.5
boilerplate_markers = ["订阅", "分享到", "Cookie Policy", "相关推荐"]
