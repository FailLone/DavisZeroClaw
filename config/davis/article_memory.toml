# Article memory strategy.
#
# Davis agents may edit this file to improve article cleaning and value judging.
# They must not edit Rust source code. If strategy fields are insufficient,
# they should write an implementation request report instead.
#
# SCOPE: This file is parsed as `ArticleCleaningConfig`, which recognizes
# exactly two sections: `[defaults]` and `[value]`. Any other section
# (`[ingest]`, `[extract]`, `[quality_gate]`, `[rule_learning]`, ...) is
# silently dropped by serde. Those pipeline knobs live in `local.toml`
# under `[article_memory.*]`; see `local.example.toml` for the schema.
#
# LLM credentials for `[value]` (provider/api_key/base_url/model) live in
# `local.toml` under `[article_memory.value]` so they stay out of git.
# This file holds only algorithm knobs — thresholds, topic list, char caps.

[defaults]
min_kept_ratio = 0.20
max_kept_ratio = 0.98
min_normalized_chars = 800

exact_noise_lines = [
  "登录",
  "注册",
  "添加评论",
  "分享",
  "收藏",
  "喜欢",
  "关注问题",
  "写回答",
  "查看全部",
  "阅读全文",
  "收起",
  "举报",
  "广告",
]

contains_noise_lines = [
  "cookie",
  "privacy policy",
]

[value]
enabled = true
llm_judge = true
max_input_chars = 12000
min_normalized_chars = 800
save_threshold = 0.75
candidate_threshold = 0.45

target_topics = [
  "AI agent",
  "agent",
  "MCP",
  "memory",
  "Claude Code",
  "OpenAI",
  "reasoning",
  "browser automation",
  "tool use",
  "multi-agent",
  "LLM",
]
